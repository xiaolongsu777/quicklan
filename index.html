<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickTransfer</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f6f8fb;
        color: #17202a;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      #boot {
        padding: 24px;
      }

      #boot pre {
        margin: 12px 0 0;
        border: 1px solid #dce4ed;
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 12px;
      }
    </style>
    <script>
      window.__quicklanBootMessage = "QuickLAN 正在启动界面…";
      window.__quicklanBootError = "";
      window.addEventListener("error", function (event) {
        window.__quicklanBootError = String(event.message || event.error || "未知脚本错误");
        var pre = document.getElementById("boot-error");
        if (pre) pre.textContent = window.__quicklanBootError;
      });
      window.addEventListener("unhandledrejection", function (event) {
        window.__quicklanBootError = String(event.reason || "未处理 Promise 错误");
        var pre = document.getElementById("boot-error");
        if (pre) pre.textContent = window.__quicklanBootError;
      });
    </script>
  </head>
  <body>
    <div id="boot">
      <strong id="boot-text">QuickLAN 正在启动界面…</strong>
      <pre id="boot-error"></pre>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
